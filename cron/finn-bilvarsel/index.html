function norDate(iso) {
  const d = new Date(iso);
  const months = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function formatPct(n) {
  return n.toLocaleString('nb-NO') + ' kr';
}

function monthly(price, months) {
  if (!price || !months) return 0;
  const equity = 50000;
  const rate = 0.07 / 12;
  const loan = Math.max(0, price - equity);
  if (loan === 0) return 0;
  const payment = loan * (rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
  return Math.round(payment);
}

  html += '<div class="tesla-section"><div class="tesla-header"><h2>⚡ Tesla Model 3</h2><div class="count">' + tesla.length + ' annonse' + (tesla.length > 1 ? 'r' : '') + '</div><div class="line"></div></div>';
  tesla.forEach(a => {
    html += renderCard(a);
  });
  html += '</div>';
}

// Day sections
sortedDates.forEach(date => {
  const dayAds = groups[date];
  const displayDate = norDate(date);
  // Filter out tesla from day grouping if shown in tesla section (actually don't filter, show in both places)
  // The requirement says show Tesla in a separate section at top, but doesn't say to remove them from day grouping
  html += '<div class="day-section"><div class="day-header"><h2>' + displayDate + '</h2><div class="count">' + dayAds.length + ' annonse' + (dayAds.length > 1 ? 'r' : '') + '</div><div class="line"></div></div>';
  dayAds.forEach(a => {
    html += renderCard(a);
  });
  html += '</div>';
});

document.getElementById('app').innerHTML = html;

function renderCard(a) {
  const img = a.img ? '<img src="' + a.img + '" alt="' + a.title + '" loading="lazy">' : '<div class="no-img">📷 Ikke tilgjengelig</div>';
  const badge = a.fits_budget ? '<span class="card-badge badge-budget">✅ Innenfor budsjett</span>' : '<span class="card-badge badge-nobudget">⚠️ Over budsjett</span>';
  const p60 = monthly(a.price, 60);
  const p84 = monthly(a.price, 84);
  const p96 = monthly(a.price, 96);
  const priceStr = formatPct(a.price);
  return '<div class="card">'
    + '<div class="card-img-wrap">' + img + '</div>'
    + '<div class="card-body">'
    + badge
    + '<div class="card-title"><a href="' + a.link + '" target="_blank" rel="noopener">' + a.title + '</a></div>'
    + '<div class="card-meta">' + (a.meta || '') + '</div>'
    + '<div class="card-price">' + priceStr + '</div>'
    + '<div class="card-footer">'
    + '<span>💰 5 år: ' + (p60 ? p60.toLocaleString('nb-NO') + ' kr/mnd' : '—') + '</span>'
    + '<span>7 år: ' + (p84 ? p84.toLocaleString('nb-NO') + ' kr/mnd' : '—') + '</span>'
    + '<span>8 år: ' + (p96 ? p96.toLocaleString('nb-NO') + ' kr/mnd' : '—') + '</span>'
    + '</div>'
    + (a.desc ? '<div class="card-desc">' + a.desc + '</div>' : '')
    + '</div></div>';
}
</script>
</body>
</html>
