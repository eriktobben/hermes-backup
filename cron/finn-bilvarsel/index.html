function formatPrice(p) {
  if (p === null || p === undefined) return '—';
  return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}

function norwegianDate(isoString) {
  const d = new Date(isoString);
  const weekdays = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
  const months = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  return `${weekdays[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function norwegianDateShort(isoString) {
  const d = new Date(isoString);
  const months = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function getDateKey(isoString) {
  const d = new Date(isoString);
  return d.toISOString().slice(0, 10);
}

function cardHTML(ad) {
  const budget = ad.fits_budget
    ? '<span class="budget-badge budget-yes">✅ Budsjett</span>'
    : '<span class="budget-badge budget-no">⚠️ Over budsjett</span>';
  
  const price = formatPrice(ad.price);
  
  let estimates = '';
  if (ad.estimates && ad.estimates['60'] !== undefined) {
    const e60 = ad.estimates['60'] > 0 ? ad.estimates['60'] : '—';
    const e84 = ad.estimates['84'] !== undefined && ad.estimates['84'] > 0 ? ad.estimates['84'] : '—';
    const e96 = ad.estimates['96'] !== undefined && ad.estimates['96'] > 0 ? ad.estimates['96'] : '—';
    estimates = `
      <div class="card-estimates">
        <div class="est-box"><div class="est-term">5 år</div><div class="est-amount">${e60} kr</div></div>
        <div class="est-box"><div class="est-term">7 år</div><div class="est-amount">${e84} kr</div></div>
        <div class="est-box"><div class="est-term">8 år</div><div class="est-amount">${e96} kr</div></div>
      </div>`;
  }
  
  const kindIcon = ad.kind === 'elbil' ? '🔋' : '⛽';
  const meta = ad.meta || '';
  const desc = ad.desc ? ad.desc.replace(/<[^>]*>/g, '') : '';
  
  let imgHtml = '';
  if (ad.img && ad.img.trim() !== '') {
    imgHtml = `<div class="card-img-wrap"><img src="${ad.img}" alt="${ad.title}" loading="lazy"></div>`;
  }
  
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${ad.link}" target="_blank" rel="noopener">${ad.title}</a></div>
        ${budget}
      </div>
      <div class="card-meta">${kindIcon} ${meta}</div>
      <div class="card-price">${price} kr</div>
      ${estimates}
      ${desc ? `<div class="card-desc">${desc}</div>` : ''}
      ${imgHtml}
    </div>
  `;
}

function render() {
  // Group by date
  const groups = {};
  const tesla3 = [];
  
  for (const ad of ADS) {
    const dk = getDateKey(ad.first_seen);
    if (!groups[dk]) groups[dk] = [];
    groups[dk].push(ad);
    
    if (ad.title.toLowerCase().startsWith('tesla model 3')) {
      tesla3.push(ad);
    }
  }
  
  // Sort date keys descending
  const sortedDates = Object.keys(groups).sort().reverse();
  
  let html = '';
  
  // Tesla Model 3 section
  if (tesla3.length > 0) {
    html += '<div class="section-tesla"><h2>Tesla Model 3</h2>';
    for (const ad of tesla3) {
      html += cardHTML(ad);
    }
    html += '</div>';
  }
  
  // Day groups
  for (let i = 0; i < sortedDates.length; i++) {
    const dk = sortedDates[i];
    const dayAds = groups[dk];
    
    // For the Tesla section we already showed them. Should we also show them in day groups?
    // I'll show all ads in day groups including Tesla 3 (consistent with "hver dag skal ha")
    html += `<div class="day-group" data-day-index="${i}">`;
    html += `<div class="day-header"><h3>${norwegianDate(dk)}</h3><span class="day-count">${dayAds.length} annonser</span><div class="day-line"></div></div>`;
    
    for (const ad of dayAds) {
      html += cardHTML(ad);
    }
    
    html += '</div>';
  }
  
  document.getElementById('app').innerHTML = html;
}

render();
