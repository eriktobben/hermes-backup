<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1080px; height: 1920px;
      overflow: hidden;
      background: #181D25;
      font-family: 'Inter', sans-serif;
    }
    .clip {
      position: absolute;
      width: 1080px; height: 1920px;
      overflow: hidden;
    }
    .c-xy { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .flex-c { display: flex; flex-direction: column; align-items: center; }
    .flex-r { display: flex; flex-direction: row; align-items: center; }
    .tw { color: #FFFFFF; }
    .td { color: #181D25; }
    .tg { color: #4E5562; }

    .glow {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3;
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="36" data-width="1080" data-height="1920">
    <!-- BGM -->
    <audio id="bgm" class="clip" data-start="0" data-duration="36" data-track-index="1" data-volume="0.3" src="assets/bgm.wav" loop></audio>

    <!-- SCENE N -->
    <div id="sN" class="clip bg-warm c-xy" data-start="0" data-duration="4" data-track-index="0">
      <h1 class="td" style="font-size:64px;font-weight:700;">Your title</h1>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // ---- Continuous motion helpers (finite repeats) ----
    function floatUp(el, startAt, sceneDuration, delayAfter=0) {
      const visibleEnd = startAt + sceneDuration;
      const tweenStart = startAt + delayAfter;
      const remaining = visibleEnd - tweenStart;
      const repeats = Math.floor(remaining / 2) - 1;
      if (repeats > 0) tl.to(el, { y: -12, duration: 1, ease: "sine.inOut", repeat: repeats, yoyo: true }, tweenStart);
    }
    function pulse(el, startAt, sceneDuration, delayAfter=0) {
      const visibleEnd = startAt + sceneDuration;
      const tweenStart = startAt + delayAfter;
      const remaining = visibleEnd - tweenStart;
      const repeats = Math.floor(remaining / 1.5) - 1;
      if (repeats > 0) tl.to(el, { scale: 1.04, duration: 0.75, ease: "sine.inOut", repeat: repeats, yoyo: true, transformOrigin: "center center" }, tweenStart);
    }
    function sway(el, startAt, sceneDuration, delayAfter=0) {
      const visibleEnd = startAt + sceneDuration;
      const tweenStart = startAt + delayAfter;
      const remaining = visibleEnd - tweenStart;
      const repeats = Math.floor(remaining / 2.5) - 1;
      if (repeats > 0) tl.to(el, { rotation: 2, duration: 1.25, ease: "sine.inOut", repeat: repeats, yoyo: true, transformOrigin: "center center" }, tweenStart);
    }

    // ---- Scene N: fast entrance + continuous motion ----
    tl.fromTo("#sN h1", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 0.2);
    pulse("#sN h1", 0, 4, 1.0);

    window.__timelines["main"] = tl;
  </script>
</body>
</html>
